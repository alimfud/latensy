<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPS Latency Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
  <style>
    body { background-color: #0f172a; color: white; font-family: system-ui; }
    .card { background-color: #1e293b; border-radius: 1rem; padding: 1.5rem; }
    .btn { transition: all 0.2s; }
    .btn:hover { filter: brightness(1.2); }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #1e293b; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;
    const socket = io();
    
    // Marker icons untuk peta
    const iconVPS = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', iconSize: [25,41], iconAnchor: [12,41] });
    const iconBroker = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [25,41], iconAnchor: [12,41] });

    function App() {
      const [ip, setIp] = useState('');
      const [geo, setGeo] = useState(null);
      const [brokers, setBrokers] = useState([]);
      const [selectedBroker, setSelectedBroker] = useState(null);
      const [pingData, setPingData] = useState([]);
      const [isPinging, setIsPinging] = useState(false);
      const [search, setSearch] = useState('');
      const [error, setError] = useState('');
      const [loadingGeo, setLoadingGeo] = useState(false);
      
      const mapRef = useRef(null);
      const mapInstance = useRef(null);
      const vpsMarker = useRef(null);
      const brokerMarker = useRef(null);
      const polyline = useRef(null);

      // Inisialisasi peta setelah mount
      useEffect(() => {
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; CartoDB'
        }).addTo(map);
        mapInstance.current = map;
        return () => map.remove();
      }, []);

      // Ambil daftar broker
      useEffect(() => {
        fetch('/api/brokers')
          .then(r => r.json())
          .then(setBrokers)
          .catch(console.error);
      }, []);

      // Socket listeners
      useEffect(() => {
        socket.on('latency:update', (data) => {
          setPingData(prev => [...prev.slice(-30), { ...data, time: new Date(data.timestamp).toLocaleTimeString() }]);
        });
        socket.on('latency:started', () => setIsPinging(true));
        socket.on('latency:stopped', () => setIsPinging(false));
        socket.on('latency:error', (e) => setError(e.message));
        return () => {
          socket.off('latency:update');
          socket.off('latency:started');
          socket.off('latency:stopped');
          socket.off('latency:error');
        };
      }, []);

      // Update peta saat geo atau broker berubah
      useEffect(() => {
        if (!mapInstance.current) return;
        if (geo?.ll) {
          if (vpsMarker.current) mapInstance.current.removeLayer(vpsMarker.current);
          vpsMarker.current = L.marker(geo.ll, { icon: iconVPS }).addTo(mapInstance.current).bindPopup('VPS Location');
          mapInstance.current.setView(geo.ll, 4);
        }
        if (selectedBroker?.ip && geo?.ll) {
          // Asumsikan broker punya ip, kita perlu geo lokasi broker juga, untuk demo kita bisa geocode IP-nya
          fetch('/api/geoip', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ ip: selectedBroker.ip }) })
            .then(r => r.json())
            .then(brokerGeo => {
              if (brokerGeo?.ll) {
                if (brokerMarker.current) mapInstance.current.removeLayer(brokerMarker.current);
                brokerMarker.current = L.marker(brokerGeo.ll, { icon: iconBroker }).addTo(mapInstance.current).bindPopup(`${selectedBroker.brokerName} - ${selectedBroker.serverName}`);
                if (polyline.current) mapInstance.current.removeLayer(polyline.current);
                polyline.current = L.polyline([geo.ll, brokerGeo.ll], { color: '#06b6d4', weight: 2 }).addTo(mapInstance.current);
                mapInstance.current.fitBounds([geo.ll, brokerGeo.ll]);
              }
            });
        }
      }, [geo, selectedBroker]);

      const detectGeo = async () => {
        if (!ip) return;
        setLoadingGeo(true);
        setError('');
        try {
          const res = await fetch('/api/geoip', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ ip }) });
          const data = await res.json();
          if (data) setGeo({ ip, ...data });
          else setError('Location not found');
        } catch (e) {
          setError('Failed to detect location');
        }
        setLoadingGeo(false);
      };

      const startPing = (broker) => {
        if (!geo) { setError('Please detect VPS location first'); return; }
        if (!broker.ip) { setError('Broker IP not available'); return; }
        setSelectedBroker(broker);
        setPingData([]);
        setError('');
        socket.emit('ping:start', { vpsIp: geo.ip, targetIp: broker.ip });
      };

      const stopPing = () => socket.emit('ping:stop');

      const filteredBrokers = brokers.filter(b => 
        b.brokerName.toLowerCase().includes(search.toLowerCase()) ||
        b.serverName.toLowerCase().includes(search.toLowerCase()) ||
        b.location.toLowerCase().includes(search.toLowerCase())
      );

      const statusClass = (avg) => {
        if (avg < 5) return 'text-green-400';
        if (avg < 20) return 'text-lime-400';
        if (avg < 50) return 'text-yellow-400';
        return 'text-red-400';
      };

      return (
        <div className="max-w-6xl mx-auto">
          <h1 className="text-3xl md:text-4xl font-bold text-center mb-8 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            VPS Latency Checker
          </h1>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* Kolom Kiri */}
            <div className="space-y-6">
              <div className="card">
                <h2 className="text-xl font-semibold mb-3">Your VPS</h2>
                <input type="text" value={ip} onChange={e => setIp(e.target.value)} placeholder="Enter VPS IP address"
                       className="w-full bg-gray-800 rounded-lg px-4 py-2 outline-none border border-gray-700 focus:border-cyan-500" />
                <button onClick={detectGeo} disabled={loadingGeo || !ip}
                        className="btn mt-3 w-full bg-cyan-600 hover:bg-cyan-700 disabled:opacity-50 py-2 rounded-lg font-medium">
                  {loadingGeo ? 'Detecting...' : 'Detect Location'}
                </button>
                {error && <p className="text-red-400 mt-2 text-sm">{error}</p>}
                {geo && (
                  <div className="mt-4 text-sm space-y-1">
                    <p><span className="text-gray-400">Country:</span> {geo.country}</p>
                    <p><span className="text-gray-400">City:</span> {geo.city}</p>
                    <p><span className="text-gray-400">ISP:</span> {geo.org || 'Unknown'}</p>
                    <p><span className="text-gray-400">Timezone:</span> {geo.timezone}</p>
                  </div>
                )}
              </div>

              <div className="card">
                <h2 className="text-xl font-semibold mb-3">Broker Server</h2>
                <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Search broker..."
                       className="w-full bg-gray-800 rounded-lg px-4 py-2 mb-3 outline-none border border-gray-700 focus:border-cyan-500" />
                <div className="max-h-96 overflow-y-auto scrollbar-thin space-y-2">
                  {filteredBrokers.map((b, i) => (
                    <div key={i} onClick={() => startPing(b)}
                         className={`p-3 rounded-lg cursor-pointer transition-colors ${selectedBroker?.serverName === b.serverName ? 'bg-cyan-900 border border-cyan-500' : 'bg-gray-800 hover:bg-gray-700'}`}>
                      <p className="font-medium">{b.brokerName}</p>
                      <p className="text-xs text-gray-400">{b.serverName} • {b.location}</p>
                      {!b.ip && <span className="text-yellow-500 text-xs">no IP</span>}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Kolom Kanan */}
            <div className="lg:col-span-2 space-y-6">
              <div className="card">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-xl font-semibold">
                    {selectedBroker ? `${selectedBroker.brokerName} - ${selectedBroker.serverName}` : 'Select a broker'}
                  </h2>
                  {isPinging ? (
                    <button onClick={stopPing} className="btn bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm">Stop</button>
                  ) : (
                    selectedBroker && <button onClick={() => startPing(selectedBroker)} className="btn bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg text-sm">Start</button>
                  )}
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                  {['avg','min','max','packetLoss'].map(k => (
                    <div key={k} className="bg-gray-900 p-4 rounded-lg text-center">
                      <div className="text-xs uppercase text-gray-400">{k}</div>
                      <div className={`text-2xl font-mono mt-1 ${k==='avg' && pingData.length > 0 ? statusClass(pingData[pingData.length-1].avg) : ''}`}>
                        {pingData.length > 0 ? k==='packetLoss' ? `${pingData[pingData.length-1][k]}%` : `${Number(pingData[pingData.length-1][k]).toFixed(1)} ms` : '-'}
                      </div>
                    </div>
                  ))}
                  <div className="bg-gray-900 p-4 rounded-lg text-center">
                    <div className="text-xs uppercase text-gray-400">Jitter</div>
                    <div className="text-2xl font-mono mt-1">
                      {pingData.length > 0 ? `${pingData[pingData.length-1].jitter} ms` : '-'}
                    </div>
                  </div>
                </div>
                <div className="h-48">
                  {pingData.length > 0 ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={pingData}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                        <XAxis dataKey="time" stroke="#94a3b8" fontSize={12} />
                        <YAxis stroke="#94a3b8" />
                        <Tooltip />
                        <Line type="monotone" dataKey="avg" stroke="#10b981" strokeWidth={2} dot={false} />
                      </LineChart>
                    </ResponsiveContainer>
                  ) : (
                    <div className="flex items-center justify-center h-full text-gray-500">Start ping to see latency chart</div>
                  )}
                </div>
              </div>
              <div className="card overflow-hidden" style={{ height: '400px' }}>
                <div id="map" className="h-full w-full rounded-lg"></div>
              </div>
            </div>
          </div>
          <footer className="text-center text-gray-500 text-sm mt-8">Real-time latency monitoring • Data updates every 3 seconds</footer>
        </div>
      );
    }

    // Mount React ke DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</body>
</html>
