<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPS/Broker Latency Checker</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- PropTypes (dibutuhkan Recharts) -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <!-- Recharts (pastikan global Recharts tersedia) -->
  <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
  <!-- Babel standalone untuk JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: system-ui; margin: 0; }
    .card { background: #1e293b; border-radius: 1rem; padding: 1.5rem; }
    .btn { transition: 0.2s; }
    .btn:hover { filter: brightness(1.15); }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #1e293b; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // Tunggu semua script selesai
    const { useState, useEffect, useRef, useCallback } = React;
    const {
      LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer
    } = Recharts;

    // Ikon Leaflet
    const vpsIcon = L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
    });
    const brokerIcon = L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
    });

    // Data broker default
    const DEFAULT_BROKERS = [
      { brokerName: 'IC Markets', serverName: 'ICMarkets-Demo', location: 'London, UK', ip: '51.75.145.200' },
      { brokerName: 'Exness', serverName: 'Exness-Real', location: 'Singapore', ip: '185.186.79.24' },
      { brokerName: 'Pepperstone', serverName: 'Pepperstone-Edge', location: 'New York, US', ip: '104.18.20.100' },
      { brokerName: 'XM', serverName: 'XM-Demo', location: 'Cyprus', ip: '82.102.16.2' },
      { brokerName: 'FXTM', serverName: 'FXTM-ECN', location: 'London, UK', ip: '74.125.200.94' },
      { brokerName: 'Tickmill', serverName: 'Tickmill-Demo', location: 'Frankfurt, DE', ip: '78.46.79.183' },
      { brokerName: 'FBS', serverName: 'FBS-Real', location: 'Amsterdam, NL', ip: '89.105.193.5' },
      { brokerName: 'OctaFX', serverName: 'OctaFX-Real', location: 'Singapore', ip: '168.138.208.21' },
    ];

    function App() {
      const [brokers] = useState(DEFAULT_BROKERS);
      const [search, setSearch] = useState('');
      const [selectedBroker, setSelectedBroker] = useState(null);
      const [targetIP, setTargetIP] = useState('');
      const [geoInfo, setGeoInfo] = useState(null);
      const [loadingGeo, setLoadingGeo] = useState(false);
      const [testRunning, setTestRunning] = useState(false);
      const [results, setResults] = useState([]);
      const [stats, setStats] = useState({ avg: '-', min: '-', max: '-', loss: '-', jitter: '-' });
      const [error, setError] = useState('');

      const mapInstance = useRef(null);
      const markerRef = useRef(null);
      const intervalRef = useRef(null);

      // Inisialisasi peta
      useEffect(() => {
        const map = L.map('map', { center: [0, 0], zoom: 2 });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: 'CartoDB'
        }).addTo(map);
        mapInstance.current = map;
        return () => map.remove();
      }, []);

      // Geo lookup
      const lookupGeo = async (ip) => {
        if (!ip) return;
        setLoadingGeo(true);
        setError('');
        try {
          const res = await fetch(`https://ipapi.co/${ip}/json/`);
          const data = await res.json();
          if (data.error) throw new Error(data.reason || 'Invalid IP');
          const geo = {
            ip,
            country: data.country_name,
            city: data.city,
            region: data.region,
            ll: [data.latitude, data.longitude],
            timezone: data.timezone,
            org: data.org,
          };
          setGeoInfo(geo);
          updateMap(geo.ll);
        } catch (err) {
          setError('Geo lookup failed: ' + err.message);
        }
        setLoadingGeo(false);
      };

      const updateMap = (latlng) => {
        if (!mapInstance.current) return;
        if (markerRef.current) mapInstance.current.removeLayer(markerRef.current);
        markerRef.current = L.marker(latlng, { icon: brokerIcon })
          .addTo(mapInstance.current)
          .bindPopup(`Lat: ${latlng[0].toFixed(4)}, Lon: ${latlng[1].toFixed(4)}`)
          .openPopup();
        mapInstance.current.setView(latlng, 6);
      };

      const selectBroker = (broker) => {
        setSelectedBroker(broker);
        setTargetIP(broker.ip);
        setGeoInfo(null);
        setResults([]);
        setStats({ avg: '-', min: '-', max: '-', loss: '-', jitter: '-' });
        setError('');
        if (broker.ip) lookupGeo(broker.ip);
      };

      const measureLatency = useCallback(async () => {
        const ip = selectedBroker?.ip;
        if (!ip) return null;
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);
        const start = performance.now();
        try {
          await fetch(`http://${ip}`, { mode: 'no-cors', signal: controller.signal });
        } catch (e) {
          // abort atau network error
        }
        clearTimeout(timeout);
        return performance.now() - start;
      }, [selectedBroker]);

      const startTest = useCallback(() => {
        if (!selectedBroker?.ip) {
          setError('Select a broker first');
          return;
        }
        if (testRunning) return;
        setTestRunning(true);
        setResults([]);

        const runSample = async () => {
          const latency = await measureLatency();
          if (latency !== null) {
            setResults(prev => {
              const newArr = [...prev, { time: new Date().toLocaleTimeString(), latency }].slice(-30);
              const latencies = newArr.map(r => r.latency);
              const avg = latencies.reduce((a,b)=>a+b,0)/latencies.length;
              const min = Math.min(...latencies);
              const max = Math.max(...latencies);
              let jitter = 0;
              if (latencies.length > 1) {
                const diffs = [];
                for (let i=1; i<latencies.length; i++) diffs.push(Math.abs(latencies[i]-latencies[i-1]));
                jitter = diffs.reduce((a,b)=>a+b,0)/diffs.length;
              }
              setStats({
                avg: avg.toFixed(1) + ' ms',
                min: min.toFixed(1) + ' ms',
                max: max.toFixed(1) + ' ms',
                loss: '0%',
                jitter: jitter.toFixed(2) + ' ms',
              });
              return newArr;
            });
          }
        };

        runSample();
        intervalRef.current = setInterval(runSample, 2500);
      }, [selectedBroker, testRunning, measureLatency]);

      const stopTest = () => {
        if (intervalRef.current) {
          clearInterval(intervalRef.current);
          intervalRef.current = null;
        }
        setTestRunning(false);
      };

      useEffect(() => {
        return () => { if (intervalRef.current) clearInterval(intervalRef.current); };
      }, []);

      const filteredBrokers = brokers.filter(b =>
        b.brokerName.toLowerCase().includes(search.toLowerCase()) ||
        b.serverName.toLowerCase().includes(search.toLowerCase()) ||
        b.location.toLowerCase().includes(search.toLowerCase())
      );

      const statusColor = (val) => {
        const num = parseFloat(val);
        if (isNaN(num)) return '';
        if (num < 5) return 'text-green-400';
        if (num < 20) return 'text-lime-400';
        if (num < 50) return 'text-yellow-400';
        return 'text-red-400';
      };

      return (
        <div className="max-w-6xl mx-auto p-4 md:p-8">
          <h1 className="text-3xl md:text-4xl font-bold text-center mb-8 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            Latency Checker – VPS/Broker
          </h1>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* Kolom Kiri */}
            <div className="space-y-6">
              <div className="card">
                <h2 className="text-lg font-semibold mb-3">Target IP</h2>
                <div className="flex gap-2">
                  <input type="text" value={targetIP} onChange={e => setTargetIP(e.target.value)}
                    placeholder="e.g. 51.75.145.200"
                    className="flex-1 bg-gray-800 rounded-lg px-3 py-2 outline-none border border-gray-700 focus:border-cyan-500" />
                  <button onClick={() => lookupGeo(targetIP)} disabled={!targetIP || loadingGeo}
                    className="btn bg-cyan-600 hover:bg-cyan-700 px-4 py-2 rounded-lg text-sm font-medium disabled:opacity-50">
                    {loadingGeo ? '...' : 'Lookup'}
                  </button>
                </div>
                {error && <p className="text-red-400 text-xs mt-2">{error}</p>}
                {geoInfo && (
                  <div className="mt-3 text-sm space-y-1">
                    <p><span className="text-gray-400">Location:</span> {geoInfo.city}, {geoInfo.country}</p>
                    <p><span className="text-gray-400">ISP:</span> {geoInfo.org || 'N/A'}</p>
                    <p><span className="text-gray-400">Timezone:</span> {geoInfo.timezone}</p>
                    <p className="text-xs text-gray-500">Lat: {geoInfo.ll[0]}, Lon: {geoInfo.ll[1]}</p>
                  </div>
                )}
              </div>

              <div className="card">
                <h2 className="text-lg font-semibold mb-3">Broker Servers</h2>
                <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                  placeholder="Search broker..."
                  className="w-full bg-gray-800 rounded-lg px-3 py-2 mb-3 outline-none border border-gray-700 focus:border-cyan-500 text-sm" />
                <div className="max-h-80 overflow-y-auto scrollbar-thin space-y-2">
                  {filteredBrokers.map((broker, idx) => (
                    <div key={idx} onClick={() => selectBroker(broker)}
                      className={`p-3 rounded-lg cursor-pointer transition-colors ${
                        selectedBroker?.ip === broker.ip ? 'bg-cyan-900 border border-cyan-500' : 'bg-gray-800 hover:bg-gray-700'
                      }`}>
                      <p className="font-medium text-sm">{broker.brokerName}</p>
                      <p className="text-xs text-gray-400">{broker.serverName} • {broker.location}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Kolom Kanan */}
            <div className="lg:col-span-2 space-y-6">
              <div className="card">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-xl font-semibold">
                    {selectedBroker ? `${selectedBroker.brokerName} - ${selectedBroker.serverName}` : 'Select a broker'}
                  </h2>
                  <div>
                    {!testRunning ? (
                      <button onClick={startTest} disabled={!selectedBroker?.ip}
                        className="btn bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg text-sm font-medium disabled:opacity-50">
                        Start Test
                      </button>
                    ) : (
                      <button onClick={stopTest}
                        className="btn bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm font-medium">
                        Stop
                      </button>
                    )}
                  </div>
                </div>

                <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
                  {['Avg','Min','Max','Loss','Jitter'].map((label, i) => (
                    <div key={i} className="bg-gray-900 p-3 rounded-lg text-center">
                      <div className="text-xs text-gray-400 uppercase">{label}</div>
                      <div className={`text-lg font-mono mt-1 ${i === 0 ? statusColor(stats.avg) : ''}`}>
                        {Object.values(stats)[i]}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="h-48">
                  {results.length > 0 ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={results}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                        <XAxis dataKey="time" stroke="#94a3b8" fontSize={10} />
                        <YAxis stroke="#94a3b8" />
                        <Tooltip />
                        <Line type="monotone" dataKey="latency" stroke="#10b981" strokeWidth={2} dot={false} />
                      </LineChart>
                    </ResponsiveContainer>
                  ) : (
                    <div className="flex items-center justify-center h-full text-gray-500 text-sm">
                      {testRunning ? 'Collecting data...' : 'No data yet'}
                    </div>
                  )}
                </div>
              </div>

              <div className="card overflow-hidden p-0" style={{ height: '400px' }}>
                <div id="map" className="h-full w-full rounded-lg"></div>
              </div>
            </div>
          </div>
          <p className="text-center text-gray-500 text-xs mt-6">
            * Latency diukur dari browser Anda ke IP broker (fetch no-cors).
          </p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
